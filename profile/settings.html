<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Akun</title>

    <link rel="stylesheet" href="/css/variables.css">

    <link rel="stylesheet" href="/css/typography.css">

    <link rel="stylesheet" href="/css/spacing.css">

    <link rel="stylesheet" href="/css/utilities.css">
    
    <link rel="stylesheet" href="/css/cards.css">

    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div id="site-header"></div>

<main>

    <section
        class="
        section
        "
    >

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">

                        Pengaturan Akun

                    </h1>

                    <p class="section-description">

                        Kelola informasi akun, keamanan, dan preferensi data Anda.

                    </p>

                </div>

            </div>

            <div style="margin-top: var(--space-6);">

                <section class="settings-card" style="margin-bottom: var(--space-4);">

                    <h2>
                        Informasi Akun
                    </h2>

                    <form id="profile-form">

                        <div class="form-group">

                            <label>
                                Nama
                            </label>

                            <input id="nama" type="text">

                        </div>

                        <div class="form-group">

                            <label>
                                Email
                            </label>

                            <input id="email" type="email" disabled>

                        </div>

                        <button type="submit">
                            Simpan Perubahan
                        </button>

                    </form>

                </section>

                <section class="settings-card" style="margin-bottom: var(--space-4);">

                    <h2>
                        Ganti Password
                    </h2>

                    <form id="password-form">

                        <div class="form-group">

                            <label>
                                Password Baru
                            </label>

                            <input id="password" type="password" minlength="6" required>

                        </div>

                        <button type="submit">
                            Ubah Password
                        </button>

                    </form>

                </section>

                <section class="settings-card" style="margin-bottom: var(--space-4);">

                    <h2>
                        Preferensi
                    </h2>

                    <a href="/profile/preferences.html">
                        Kelola Preferensi →
                    </a>

                </section>

                <section class="settings-card">

                    <h2>
                        Danger Zone
                    </h2>

                    <button id="delete-account">
                        Hapus Akun
                    </button>

                </section>

            </div>

        </div>

    </section>

</main>

<div id="site-footer"></div>

<script src="/js/supabase-public.js"></script>

<script src="/js/layout/layout.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/protected-route.js"></script>
<script src="/profile/settings.js"></script>

</body>
</html>
