<html lang="id">
<head>

    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Profil Saya | Portal Sastra Indonesia</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">

<body>

<div id="site-header"></div>

<main>

    <section class="section">

        <div class="container">

            <div id="breadcrumb"></div>

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Profil Saya
                    </h1>

                    <p class="section-description">
                        Kelola informasi akun dan pengaturan profil Anda.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6);">
                
                <div class="card-header profile-page-header">
                    <h3>
                        <img
                            src="/assets/icons/user-round.svg"
                            class="section-icon"
                            alt=""
                        >
                        Informasi Profil
                    </h3>
                </div>

                <div class="card-body">

                    <div id="profile-container">

                        <div class="card skeleton" style="height: 200px;"></div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<div id="site-footer"></div>
