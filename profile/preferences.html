<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Preferensi</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div id="site-header"></div>

<main>

    <section
        class="
        section
        "
    >

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">

                        Preferensi Pengguna

                    </h1>

                    <p class="section-description">

                        Atur konfigurasi tampilan dan fungsionalitas akun Anda.

                    </p>

                </div>

            </div>

            <form id="preferences-form" style="margin-top: var(--space-6);">

                <div class="form-group">

                    <label>
                        Tema
                    </label>

                    <select id="theme">

                        <option value="light">
                            Light
                        </option>

                        <option value="dark">
                            Dark
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Jumlah Item per Halaman
                    </label>

                    <select id="items-per-page">

                        <option value="10">
                            10
                        </option>

                        <option value="20">
                            20
                        </option>

                        <option value="50">
                            50
                        </option>

                    </select>

                </div>

                <label>
                    <input type="checkbox" id="enable-history">
                    Simpan Riwayat Pencarian
                </label>

                <br><br>

                <label>
                    <input type="checkbox" id="enable-autocomplete">
                    Aktifkan Autocomplete
                </label>

                <br><br>

                <button type="submit">
                    Simpan Preferensi
                </button>

            </form>

        </div>

    </section>

</main>

<div id="site-footer"></div>

<script src="/js/supabase-public.js"></script>
<script src="/js/layout/layout.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/protected-route.js"></script>
<script src="/js/auth/preferences.js"></script>
<script src="/profile/preferences.js"></script>

</body>
</html>
