<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preferensi | Portal Sastra Indonesia</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div id="site-header"></div>

<main>

    <section class="section">

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Preferensi Pengguna
                    </h1>

                    <p class="section-description">
                        Atur konfigurasi tampilan dan fungsionalitas akun Anda.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6);">
                
                <div class="card-header">
                    <h3 style="margin: 0;">Konfigurasi Akun</h3>
                </div>

                <div class="card-body">

                    <div id="preferences-skeleton" class="card skeleton" style="height: 200px; display: none;"></div>

                    <form id="preferences-form">

                        <div class="form-group" style="margin-bottom: var(--space-4);">

                            <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                Tema Tampilan
                            </label>

                            <select id="theme" class="select">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                            </select>

                        </div>

                        <div class="form-group" style="margin-bottom: var(--space-4);">

                            <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                Jumlah Item per Halaman
                            </label>

                            <select id="items-per-page" class="select">
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="50">50</option>
                            </select>

                        </div>

                        <div class="form-group" style="margin-bottom: var(--space-3);">
                            <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
                                <input type="checkbox" id="enable-history">
                                <span>Simpan Riwayat Pencarian</span>
                            </label>
                        </div>

                        <div class="form-group" style="margin-bottom: var(--space-4);">
                            <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
                                <input type="checkbox" id="enable-autocomplete">
                                <span>Aktifkan Autocomplete</span>
                            </label>
                        </div>

                    </form>

                </div>

                <div class="card-footer" style="display: flex; justify-content: flex-end;">
                    
                    <button 
                        type="submit" 
                        form="preferences-form" 
                        class="
                        btn 
                        btn-primary
                        "
                    >
                        Simpan Preferensi
                    </button>

                </div>

            </div>

        </div>

    </section>

</main>

<div id="site-footer"></div>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>
<script src="/js/auth/auth-state.js"></script>
<script src="/js/auth/protected-route.js"></script>
<script src="/js/auth/preferences.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/profile/preferences.js"></script>

</body>
</html>
