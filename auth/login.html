<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1"
    >

    <title>Masuk</title>

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/auth.css"
    >
</head>
<body>

<main class="auth-page">

    <div class="auth-card">

        <h1>
            Masuk
        </h1>

        <p>
            Masuk untuk mengakses bookmark
            dan fitur personal lainnya.
        </p>

        <form id="login-form">

            <div class="form-group">

                <label>
                    Email
                </label>

                <input
                    id="email"
                    type="email"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input
                    id="password"
                    type="password"
                    required
                >

            </div>

            <button
                class="btn-auth"
                type="submit"
            >
                Masuk
            </button>

        </form>

        <p class="auth-footer">

            Belum punya akun?

            <a href="register.html">

                Daftar

            </a>

        </p>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-public.js"></script>
<script src="../js/auth/auth-service.js"></script>
<script src="../js/auth/login.js"></script>

</body>
</html>
