<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Masuk</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-page">

    <div class="auth-card card">

        <div class="auth-header">

            <div class="auth-icon">

                <img
                    src="/assets/icons/shield-check.svg"
                    alt="Login">

            </div>

            <h1>Masuk</h1>

            <p>
                Masuk untuk mengakses bookmark,
                riwayat pencarian, dan fitur personal Portal Sastra Indonesia.
            </p>

        </div>

        <form
            id="login-form"
            class="auth-form">

            <div class="form-group">

                <label for="email">
                    Email
                </label>

                <div class="input-icon">

                    <img
                        src="/assets/icons/mail.svg"
                        alt="Email">

                    <input
                        id="email"
                        class="input"
                        type="email"
                        placeholder="nama@email.com"
                        required>

                </div>

            </div>

            <div class="form-group">

                <label for="password">
                    Kata Sandi
                </label>

                <div class="input-icon">

                    <img
                        src="/assets/icons/lock-keyhole.svg"
                        alt="Password">

                    <input
                        id="password"
                        class="input"
                        type="password"
                        placeholder="Masukkan kata sandi"
                        required>

                </div>

            </div>

            <button
                class="btn btn-primary btn-auth"
                type="submit">

                <img
                    src="/assets/icons/log-in.svg"
                    alt=""
                    class="btn-icon">

                Masuk

            </button>

        </form>

        <div class="auth-divider"></div>

        <div class="card-footer auth-footer">

            <p>
                Belum punya akun?
                <a href="register.html">
                    Daftar sekarang
                </a>
            </p>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-public.js"></script>
<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/login.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

</body>
</html>
