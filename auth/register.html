<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Daftar Akun</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-page">

    <div class="auth-card card">

        <div class="auth-header">

            <div class="auth-icon">

                <img
                    src="/assets/icons/user-plus.svg"
                    alt="Register">

            </div>

            <h1>Buat Akun</h1>

            <p>
                Daftar untuk menyimpan bookmark, riwayat pencarian,
                dan fitur personal Portal Sastra Indonesia lainnya.
            </p>

        </div>

        <form
            id="register-form"
            class="auth-form">

            <!-- ========================= -->
            <!-- Informasi Akun            -->
            <!-- ========================= -->
            <div class="auth-section">

                <h2 class="auth-section-title">Informasi Akun</h2>

                <div class="form-group">

                    <label for="nama_lengkap">
                        Nama Lengkap
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/user.svg"
                            alt="Nama">

                        <input
                            id="nama_lengkap"
                            class="input"
                            type="text"
                            placeholder="Masukkan nama lengkap"
                            maxlength="100"
                            autocomplete="name"
                            required>

                    </div>

                </div>

                <div class="form-group">

                    <label for="username">
                        Username
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/at-sign.svg"
                            alt="Username">

                        <input
                            id="username"
                            class="input"
                            type="text"
                            maxlength="30"
                            autocomplete="username"
                            placeholder="contoh: andhika12"
                            required>

                    </div>

                    <small
                        id="username-feedback"
                        class="field-feedback">
                    </small>

                </div>

                <div class="form-group">

                    <label for="email">
                        Alamat Email Aktif
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/mail.svg"
                            alt="Email">

                        <input
                            id="email"
                            class="input"
                            type="email"
                            placeholder="nama@email.com"
                            autocomplete="email"
                            required>

                    </div>

                </div>

            </div>

            <!-- ========================= -->
            <!-- Keamanan Akun             -->
            <!-- ========================= -->
            <div class="auth-section">

                <h2 class="auth-section-title">Keamanan Akun</h2>

                <div class="form-group">

                    <label for="password">
                        Kata Sandi
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/lock-keyhole.svg"
                            alt="Password">

                        <input
                            id="password"
                            class="input"
                            type="password"
                            placeholder="Minimal 8 karakter"
                            minlength="8"
                            autocomplete="new-password"
                            required>

                    </div>

                </div>

                <div class="form-group">

                    <label for="confirm_password">
                        Konfirmasi Kata Sandi
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/shield-check.svg"
                            alt="Konfirmasi Password">

                        <input
                            id="confirm_password"
                            class="input"
                            type="password"
                            placeholder="Ulangi kata sandi"
                            minlength="8"
                            autocomplete="new-password"
                            required>

                    </div>

                </div>

            </div>

            <!-- ========================= -->
            <!-- Informasi Tambahan        -->
            <!-- ========================= -->
            <div class="auth-section">

                <h2 class="auth-section-title">Informasi Tambahan</h2>

                <div class="form-group">

                    <label for="no_telp">
                        Nomor Telepon <small>(Opsional)</small>
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/phone.svg"
                            alt="Nomor Telepon">

                        <input
                            id="no_telp"
                            class="input"
                            type="tel"
                            placeholder="Contoh: 08123456789"
                            maxlength="20"
                            autocomplete="tel">

                    </div>

                </div>

                <div class="form-group">

                    <label for="tanggal_lahir">
                        Tanggal Lahir
                    </label>

                    <div class="input-icon">

                        <img
                            src="/assets/icons/calendar-days.svg"
                            alt="Tanggal Lahir">

                        <input
                            id="tanggal_lahir"
                            class="input"
                            type="date"
                            required>

                    </div>

                </div>

                <div class="form-group">

                    <label>
                        Jenis Kelamin
                    </label>

                    <div class="radio-group">

                        <label class="radio-card">

                            <input
                                type="radio"
                                name="jenis_kelamin"
                                value="Laki-laki"
                                required>

                            <span class="radio-label-wrapper">

                                <img 
                                    src="/assets/icons/users.svg" 
                                    alt="" 
                                    class="radio-icon">

                                Laki-laki

                            </span>

                        </label>

                        <label class="radio-card">

                            <input
                                type="radio"
                                name="jenis_kelamin"
                                value="Perempuan">

                            <span class="radio-label-wrapper">

                                <img 
                                    src="/assets/icons/users.svg" 
                                    alt="" 
                                    class="radio-icon">

                                Perempuan

                            </span>

                        </label>

                    </div>

                </div>

            </div>

            <button
                class="btn btn-primary btn-auth"
                type="submit">

                <img
                    src="/assets/icons/user-plus.svg"
                    alt=""
                    class="btn-icon">

                Daftar

            </button>

        </form>

        <div class="auth-divider"></div>

        <div class="card-footer auth-footer">

            <p>
                Sudah punya akun?
                <a href="login.html">
                    Masuk
                </a>
            </p>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-public.js"></script>
<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/register.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

</body>
</html>
