<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Daftar Akun</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-page">

    <div class="container">

        <div class="auth-card card">

            <div class="card-header">
                <h1>
                    Buat Akun
                </h1>
            </div>

            <div class="card-body">
                <p style="margin-bottom: var(--space-4);">
                    Daftar untuk menyimpan bookmark
                    dan fitur personal lainnya.
                </p>

                <form id="register-form">

                    <div class="form-group">

                        <label for="nama">
                            Nama
                        </label>

                        <input id="nama" class="input" type="text" required>

                    </div>

                    <div class="form-group" style="margin-top: var(--space-4);">

                        <label for="email">
                            Email
                        </label>

                        <input id="email" class="input" type="email" required>

                    </div>

                    <div class="form-group" style="margin-top: var(--space-4);">

                        <label for="password">
                            Password
                        </label>

                        <input id="password" class="input" type="password" minlength="6" required>

                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: var(--space-5);">
                        Daftar
                    </button>

                </form>
            </div>

            <div class="card-footer">
                <p class="auth-footer">
                    Sudah punya akun?
                    <a href="login.html">
                        Masuk
                    </a>
                </p>
            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-public.js"></script>
<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/register.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

</body>
</html>
