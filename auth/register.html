<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Daftar Akun</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-page">

    <div class="container">

        <div class="auth-card card">

            <div class="card-header">
                <h1>
                    Buat Akun
                </h1>
            </div>

            <div class="card-body">
                <p style="margin-bottom: var(--space-4);">
                    Daftar untuk menyimpan bookmark
                    dan fitur personal lainnya.
                </p>

                <form id="register-form">

                    <!-- ========================= -->
                    <!-- Informasi Identitas -->
                    <!-- ========================= -->

                    <div class="form-group">

                        <label for="nama_lengkap">
                            Nama Lengkap
                        </label>

                        <input
                            id="nama_lengkap"
                            class="input"
                            type="text"
                            maxlength="100"
                            autocomplete="name"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label for="username">
                            Username
                        </label>

                        <input
                            id="username"
                            class="input"
                            type="text"
                            maxlength="30"
                            autocomplete="username"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label for="email">
                            Alamat Email Aktif
                        </label>

                        <input
                            id="email"
                            class="input"
                            type="email"
                            autocomplete="email"
                            required
                        >

                    </div>

                    <!-- ========================= -->
                    <!-- Keamanan -->
                    <!-- ========================= -->

                    <div class="form-group">

                        <label for="password">
                            Kata Sandi
                        </label>

                        <input
                            id="password"
                            class="input"
                            type="password"
                            minlength="8"
                            autocomplete="new-password"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label for="confirm_password">
                            Konfirmasi Kata Sandi
                        </label>

                        <input
                            id="confirm_password"
                            class="input"
                            type="password"
                            minlength="8"
                            autocomplete="new-password"
                            required
                        >

                    </div>

                    <!-- ========================= -->
                    <!-- Informasi Tambahan -->
                    <!-- ========================= -->

                    <div class="form-group">

                        <label for="no_telp">
                            Nomor Telepon
                            <small>(Opsional)</small>
                        </label>

                        <input
                            id="no_telp"
                            class="input"
                            type="tel"
                            maxlength="20"
                            autocomplete="tel"
                        >

                    </div>

                    <div class="form-group">

                        <label for="tanggal_lahir">
                            Tanggal Lahir
                        </label>

                        <input
                            id="tanggal_lahir"
                            class="input"
                            type="date"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label for="jenis_kelamin">
                            Jenis Kelamin
                        </label>

                        <select
                            id="jenis_kelamin"
                            class="select"
                            required
                        >

                            <option value="">
                                Pilih Jenis Kelamin
                            </option>

                            <option value="Laki-laki">
                                Laki-laki
                            </option>

                            <option value="Perempuan">
                                Perempuan
                            </option>

                        </select>

                    </div>

                    <button
                        class="btn btn-primary"
                        type="submit"
                        style="width:100%;"
                    >

                        Daftar

                    </button>

                </form>
            </div>

            <div class="card-footer">
                <p class="auth-footer">
                    Sudah punya akun?
                    <a href="login.html">
                        Masuk
                    </a>
                </p>
            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-public.js"></script>
<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/register.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

</body>
</html>
