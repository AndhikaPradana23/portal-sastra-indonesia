<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Global Search | Portal Sastra Indonesia</title>

    <meta name="description" content="Cari istilah sastra, artikel, karya sastra, dan sastrawan dalam Portal Sastra Indonesia.">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/search.css">

</head>

<body>

    <header id="site-header"></header>

    <main>

        <section class="section">

            <div class="container">

                <div class="section-header">

                    <div>

                        <h1 class="section-title">
                            Global Search
                        </h1>

                        <p class="section-description">
                            Cari istilah, artikel, karya sastra, maupun sastrawan.
                        </p>

                    </div>

                </div>

                <div class="search-box" style="margin-top: var(--space-6);">

                    🔎

                    <input 
                        id="search-input" 
                        class="input" 
                        type="text" 
                        placeholder="Cari istilah, artikel, karya, sastrawan..." 
                        autocomplete="off"
                    >

                    <div id="autocomplete-result" class="autocomplete-list"></div>

                    <div id="search-suggestion" class="suggestion-list"></div>

                </div>

                <section class="history-section" style="margin-top: var(--space-6);">

                    <h2>
                        Riwayat Pencarian
                    </h2>

                    <div id="search-history">
                        <div class="empty-state">
                            <div class="empty-icon">🕒</div>
                            <h3>Belum Ada Riwayat</h3>
                            <p>Aktivitas pencarian Anda akan muncul di sini.</p>
                        </div>
                    </div>

                </section>

                <section class="popular-search-section" style="margin-top: var(--space-6);">
                    <h2>
                        🔥 Pencarian Populer
                    </h2>
                    <div id="popular-search">
                        <div class="card skeleton" style="height: 50px;"></div>
                    </div>
                </section>

                <div class="search-summary" style="margin-top: var(--space-6);">
                    <h2 id="search-title">
                        Hasil Pencarian
                    </h2>
                    <p id="search-total"></p>
                </div>

                <section id="search-status" style="margin-top: var(--space-4);">
                    <div class="card skeleton" style="height: 200px;"></div>
                </section>

                <section id="search-results" class="search-results" style="margin-top: var(--space-4);">
                </section>

            </div>

        </section>

    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-public.js"></script>

    <script src="/js/search/search-service.js"></script>
    <script src="/js/search/search-renderer.js"></script>
    <script src="/js/search/autocomplete.js"></script>
    <script src="/js/search/search-page.js"></script>
    <script src="/js/search/search-results.js"></script>
    <script src="/js/search/search-group.js"></script>
    <script src="/js/search/search-utils.js"></script>
    <script src="/js/search/popular-search-service.js"></script>
    <script src="/js/search/search-history-sync.js"></script>
    <script src="/js/search/search-seo.js"></script>
    <script src="/js/search/search-api.js"></script>

    <script src="/js/global-search.js"></script>

    <script src="/js/layout/layout.js"></script>
    <script src="/js/layout/active-menu.js"></script>
    <script src="/js/layout/mobile-menu.js"></script>

    <script src="/js/auth/auth-service.js"></script>
    <script src="/js/auth/profile-service.js"></script>
    <script src="/js/auth/role-service.js"></script>
    <script src="/js/auth/auth-ui.js"></script>
    <script src="/js/auth/logout.js"></script>
    <script src="/js/auth/auth-state.js"></script>

    <script src="index.js"></script>

</body>

</html>
