<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title id="page-title">Artikel</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/artikel.css">

<script id="jsonld-schema" type="application/ld+json">{}</script>
</head>

<body>

    <header id="site-header"></header>

    <main class="article-detail">

        <section class="section article-detail-page">

            <div class="container">

                <div id="breadcrumb"></div>

                <div class="section-header">

                    <div>

                        <h1 class="section-title">
                            Artikel Sastra
                        </h1>

                        <p class="section-description">
                            Artikel, esai, dan kajian sastra Indonesia.
                        </p>

                    </div>

                </div>

                <!-- Tombol Kembali -->

                <a href="index.html" class="back-link btn btn-outline">

                    <img src="/assets/icons/arrow-left.svg" alt="" class="btn-icon">

                    <span>Kembali ke Artikel</span>

                </a>

                <!-- Thumbnail -->

                <div id="thumbnail-container" class="article-thumbnail">
                </div>

                <!-- Judul -->

                <h1 id="judul" class="article-title">

                    <div class="skeleton article-title-skeleton">
                    </div>

                </h1>

                <!-- Tombol Aksi -->

                <div class="article-actions">

                    <button id="bookmark-button" class="bookmark-btn btn btn-outline">

                        <img src="/assets/icons/bookmark.svg" class="btn-icon" alt="">

                        <span>Simpan</span>

                    </button>

                    <button id="citation-btn" class="citation-btn btn btn-primary">

                        <img src="/assets/icons/quote.svg" class="btn-icon" alt="">

                        <span>Sitasi Artikel</span>

                    </button>

                </div>

                <!-- Metadata -->

                <div id="artikel-meta" class="article-meta">

                    <p id="kategori"></p>

                    <p id="tanggal"></p>

                    <p id="penulis"></p>

                    <p id="estimasi-baca"></p>

                </div>

                <!-- Tag -->

                <div id="tag-container" class="tag-container">
                </div>

                <!-- Isi Artikel -->

                <article id="isi" class="article-content card">

                    <div class="skeleton skeleton-line"></div>

                    <div class="skeleton skeleton-line"></div>

                    <div class="skeleton skeleton-line short"></div>

                </article>

                <div id="istilah-terkait-container" class="related-wrapper">
                </div>

                <!-- Sastrawan -->

                <div id="sastrawan-terkait-container" class="related-wrapper">
                </div>

                <hr>

                <div id="karya-terkait-container" class="related-wrapper">
                </div>

                <!-- Artikel Terkait -->

                <div id="artikel-terkait-container" class="related-wrapper">
                </div>

            </div>

        </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="/js/supabase-public.js"></script>

    <script src="/js/auth/auth-service.js"></script>
    <script src="/js/auth/profile-service.js"></script>
    <script src="/js/auth/role-service.js"></script>
    <script src="/js/auth/auth-ui.js"></script>
    <script src="/js/auth/logout.js"></script>
    <script src="/js/auth/auth-state.js"></script>

    <script src="/js/core/helpers.js"></script>

    <script src="/js/bookmark/bookmark-service.js"></script>
    <script src="/js/bookmark/bookmark-storage.js"></script>
    <script src="/js/bookmark/bookmark-button.js"></script>

    <script src="/js/layout/layout.js"></script>
    <script src="/js/layout/active-menu.js"></script>
    <script src="/js/layout/mobile-menu.js"></script>

    <script src="/js/citation/citation-auto.js"></script>

    <script src="detail.js"></script>

</body>

</html>
