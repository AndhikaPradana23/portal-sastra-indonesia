<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title id="page-title">Artikel</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/artikel.css">

<script id="jsonld-schema" type="application/ld+json">{}</script>
</head>

<body>

    <header id="site-header"></header>

    <div id="breadcrumb"></div>

    <main class="article-detail">

        <section class="section">

            <div class="container">

                <div class="section-header">

                    <div>

                        <h1 class="section-title">
                            Artikel Sastra
                        </h1>

                        <p class="section-description">
                            Artikel dan kajian sastra Indonesia.
                        </p>

                    </div>

                </div>

                <a href="index.html" class="back-link" style="margin-top: var(--space-4); display: inline-block;">← Kembali ke Artikel</a>

                <div id="thumbnail-container" style="margin-top: var(--space-4);"></div>

                <!-- Representasi awal menggunakan skeleton untuk loading judul -->
                <h1 id="judul" style="margin-top: var(--space-4);">
                    <div class="skeleton" style="height: 40px; width: 70%; max-width: 600px; border-radius: var(--radius-sm);"></div>
                </h1>

                <!-- Integrasi Standarisasi Tombol Aksi Baru -->
                <div style="margin-top: var(--space-4); display: flex; flex-wrap: wrap; gap: var(--space-2);">
                    <button id="bookmark-button" class="bookmark-btn btn btn-outline">
                        ☆ Simpan
                    </button>
                    <button id="citation-btn" class="citation-btn btn btn-secondary">
                        📋 Sitasi Artikel
                    </button>
                </div>

                <!-- Detail Meta dibungkus rapi untuk konsistensi layout -->
                <div id="artikel-meta" class="text-light" style="margin-top: var(--space-5); display: flex; flex-wrap: wrap; gap: var(--space-4); font-size: 0.9rem;">
                    <p id="kategori" style="margin: 0;"></p>
                    <p id="tanggal" style="margin: 0;"></p>
                    <p id="penulis" style="margin: 0;"></p>
                    <p id="estimasi-baca" style="margin: 0;"></p>
                </div>

                <div id="tag-container" style="margin-top: var(--space-3); display: flex; flex-wrap: wrap; gap: var(--space-2);"></div>

                <hr style="margin: var(--space-6) 0; border: none; border-bottom: 1px solid var(--border);">

                <!-- Area Isi Artikel -->
                <div id="isi" class="card-body" style="line-height: 1.8;">
                    <div class="skeleton" style="height: 20px; margin-bottom: var(--space-2);"></div>
                    <div class="skeleton" style="height: 20px; margin-bottom: var(--space-2);"></div>
                    <div class="skeleton" style="height: 20px; margin-bottom: var(--space-2); width: 85%;"></div>
                </div>

                <!-- Bagian Konten/Entitas Terkait (Dapat menggunakan kelas .card saat dirender dinamis di JS) -->
                <div id="istilah-terkait-container" style="margin-top: var(--space-6);"></div>

                <hr style="margin: var(--space-6) 0; border: none; border-bottom: 1px solid var(--border);">

                <div id="sastrawan-terkait-container"></div>

                <hr style="margin: var(--space-6) 0; border: none; border-bottom: 1px solid var(--border);">

                <div id="karya-terkait-container"></div>

                <hr style="margin: var(--space-6) 0; border: none; border-bottom: 1px solid var(--border);">

                <div id="artikel-terkait-container"></div>

            </div>

        </section>

    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="/js/supabase-public.js"></script>

    <script src="/js/auth/auth-service.js"></script>
    <script src="/js/auth/profile-service.js"></script>
    <script src="/js/auth/role-service.js"></script>
    <script src="/js/auth/auth-ui.js"></script>
    <script src="/js/auth/logout.js"></script>
    <script src="/js/auth/auth-state.js"></script>

    <script src="/js/core/helpers.js"></script>

    <script src="/js/bookmark/bookmark-service.js"></script>
    <script src="/js/bookmark/bookmark-storage.js"></script>
    <script src="/js/bookmark/bookmark-button.js"></script>

    <script src="/js/layout/layout.js"></script>
    <script src="/js/layout/active-menu.js"></script>
    <script src="/js/layout/mobile-menu.js"></script>
    <script src="/js/layout/breadcrumb.js"></script>

    <script src="/js/citation/citation-auto.js"></script>

    <script src="detail.js"></script>

</body>

</html>
