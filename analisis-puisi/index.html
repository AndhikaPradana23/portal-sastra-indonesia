<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analisis Puisi</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/analisis-puisi.css">

</head>
<body>

    <header id="site-header"></header>

    <main>

        <section class="section">

            <div class="container">

                <div id="breadcrumb"></div>

                <div class="section-header">

                    <div class="page-heading">

                        <div class="page-icon">
                            <img
                                src="/assets/icons/file-search.svg"
                                alt="Analisis Puisi">
                        </div>

                        <div>

                            <h1 class="section-title">
                                Analisis Puisi
                            </h1>

                            <p class="section-description">
                                Tempel puisi untuk memperoleh analisis bait, larik, kata, rima, majas, serta statistik secara otomatis.
                            </p>

                        </div>

                    </div>

                </div>

                <div class="card analysis-input-card" style="margin-top: var(--space-6);">

                    <div class="card-header">

                        <div class="card-title-row">

                            <img
                                src="/assets/icons/file-pen.svg"
                                class="card-icon"
                                alt="">

                            <h2>
                                Masukkan Puisi
                            </h2>

                        </div>

                    </div>

                    <div class="card-body">

                        <textarea 
                            id="puisi-input" 
                            class="textarea" 
                            placeholder="Masukkan puisi di sini..."
                        ></textarea>

                        <div class="input-info">

                            <span id="char-count">
                                Karakter: 0
                            </span>

                            <span id="line-count">
                                Baris: 0
                            </span>

                        </div>

                        <div class="input-actions" style="margin-top: var(--space-3); display: flex; gap: var(--space-2);">

                            <button id="example-btn" class="btn btn-outline" type="button">
                                <img
                                    src="/assets/icons/book-open.svg"
                                    class="btn-icon"
                                    alt="">
                                <span>Contoh Puisi</span>
                            </button>

                            <button id="clear-btn" class="btn btn-outline" type="button">
                                <img src="/assets/icons/trash-2.svg" class="btn-icon" alt="">
                                <span>Hapus</span>
                            </button>

                            <button id="analyze-btn" class="btn btn-primary" type="button" disabled>
                                <img src="/assets/icons/wand-sparkles.svg" class="btn-icon" alt="">
                                <span>Analisis</span>
                            </button>

                        </div>

                    </div>

                </div>

                <div id="analysis-result" class="analysis-result" style="margin-top: var(--space-8);">

                    <div class="card empty-analysis-card">

                        <img
                            src="/assets/icons/file-search.svg"
                            class="empty-state-icon"
                            alt="">

                        <h3>
                            Belum Ada Analisis
                        </h3>

                        <p>
                            Masukkan teks puisi di atas kemudian klik tombol Analisis untuk melihat hasilnya.
                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="/js/supabase-public.js"></script>

    <script src="/js/auth/auth-service.js"></script>
    <script src="/js/auth/profile-service.js"></script>
    <script src="/js/auth/role-service.js"></script>
    <script src="/js/auth/auth-ui.js"></script>
    <script src="/js/auth/logout.js"></script>
    <script src="/js/auth/auth-state.js"></script>

    <script src="/js/layout/layout.js"></script>
    <script src="/js/layout/active-menu.js"></script>
    <script src="/js/layout/mobile-menu.js"></script>

    <script src="/js/puisi/input-manager.js"></script>
    <script src="/js/puisi/bait-analyzer.js"></script>
    <script src="/js/puisi/larik-analyzer.js"></script>
    <script src="/js/puisi/kata-analyzer.js"></script>
    <script src="/js/puisi/frekuensi-analyzer.js"></script>
    <script src="/js/puisi/huruf-analyzer.js"></script>
    <script src="/js/puisi/rima-analyzer.js"></script>
    <script src="/js/puisi/wordcloud.js"></script>

    <script src="/js/puisi/majas-data.js"></script>
    <script src="/js/puisi/majas-detector.js"></script>
    <script src="/js/puisi/majas-renderer.js"></script>

    <script src="/js/puisi/export-share.js"></script>
    <script src="/js/puisi/analyzer.js"></script>

    <script src="index.js"></script>

</body>
</html>
