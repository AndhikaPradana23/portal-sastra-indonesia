<div class="container header-container">

    <!-- ======================================
         LEFT AREA
    ======================================= -->

    <div class="header-left">

        <a
            href="/"
            class="logo"
            aria-label="Portal Sastra Indonesia">

            <img
                src="/assets/icons/book-open.svg"
                class="logo-icon"
                alt="Portal Sastra Indonesia">

            <span class="logo-text">

                Portal Sastra Indonesia

            </span>

        </a>

        <nav
            class="main-nav"
            aria-label="Navigasi Utama">

            <a href="/" data-menu="home">

                <img
                    src="/assets/icons/house.svg"
                    class="nav-icon"
                    alt="">

                <span>Beranda</span>

            </a>

            <a
                href="/kamus-istilah/"
                data-menu="kamus">

                <img
                    src="/assets/icons/book-text.svg"
                    class="nav-icon"
                    alt="">

                <span>Kamus</span>

            </a>

            <a
                href="/artikel/"
                data-menu="artikel">

                <img
                    src="/assets/icons/newspaper.svg"
                    class="nav-icon"
                    alt="">

                <span>Artikel</span>

            </a>

            <a
                href="/sastrawan/"
                data-menu="sastrawan">

                <img
                    src="/assets/icons/users.svg"
                    class="nav-icon"
                    alt="">

                <span>Sastrawan</span>

            </a>

            <a
                href="/karya-sastra/"
                data-menu="karya">

                <img
                    src="/assets/icons/library-big.svg"
                    class="nav-icon"
                    alt="">

                <span>Karya</span>

            </a>

        </nav>

    </div>

    <!-- ======================================
         RIGHT AREA
    ======================================= -->

    <div class="header-right">

        <!-- ======================================
             TOOLS (DESKTOP)
        ======================================= -->

        <div class="dropdown header-tools">

            <button
                type="button"
                class="dropdown-toggle btn btn-outline"
                aria-haspopup="true"
                aria-expanded="false">

                <img
                    src="/assets/icons/sliders-horizontal.svg"
                    class="nav-icon"
                    alt="">

                <span>Tools</span>

                <img
                    src="/assets/icons/chevron-down.svg"
                    class="dropdown-icon"
                    alt="">

            </button>

            <div class="dropdown-menu tools-dropdown">

                <div class="dropdown-section">

                    <h4 class="dropdown-title">

                        Pencarian Portal

                    </h4>

                    <form
                        action="/search/"
                        class="tools-search">

                        <div class="search-box">

                            <img
                                src="/assets/icons/search.svg"
                                class="search-icon"
                                alt="Cari">

                            <input
                                class="input"
                                type="search"
                                name="q"
                                placeholder="Cari istilah, artikel, karya, sastrawan...">

                        </div>

                    </form>

                </div>

                <hr>

                <div class="dropdown-section">

                    <h4 class="dropdown-title">

                        Alat Bantu

                    </h4>

                    <a href="/sitasi/">

                        <img
                            src="/assets/icons/quote.svg"
                            class="menu-icon"
                            alt="">

                        <span>Generator Sitasi</span>

                    </a>

                    <a href="/analisis-puisi/">

                        <img
                            src="/assets/icons/file-pen-line.svg"
                            class="menu-icon"
                            alt="">

                        <span>Analisis Puisi</span>

                    </a>

                    <a href="/kuis/">

                        <img
                            src="/assets/icons/graduation-cap.svg"
                            class="menu-icon"
                            alt="">

                        <span>Kuis Sastra</span>

                    </a>

                </div>

            </div>

        </div>

        <!-- auth-ui.js -->

        <div id="auth-menu"></div>

        <!-- ======================================
             MOBILE BUTTON
        ======================================= -->

        <button
            id="mobile-menu-btn"
            class="mobile-menu-btn"
            type="button"
            aria-label="Menu">

            <img
                src="/assets/icons/menu.svg"
                class="nav-icon"
                alt="Menu">

        </button>

    </div>

</div>

    <!-- ==========================
         TOOLS
    =========================== -->

    <div class="mobile-group">

        <span class="mobile-group-title">

            Tools

        </span>

        <form

            <div class="search-box">

                <img
                    src="/assets/icons/search.svg"
                    class="search-icon"

                <input
                    type="search"
                    name="q"

            </div>

        </form>

        <nav class="mobile-nav">

            <a href="/sitasi/">

                <img
                    src="/assets/icons/quote.svg"
                    class="menu-icon"

                Generator Sitasi

            </a>

            <a href="/analisis-puisi/">

                <img
                    src="/assets/icons/file-pen-line.svg"
