<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Generator Sitasi | Portal Sastra Indonesia</title>

    <meta name="description" content="Generator sitasi APA, MLA, Chicago, dan Harvard untuk mahasiswa dan peneliti.">

    <meta property="og:title" content="Generator Sitasi Portal Sastra Indonesia">

    <meta property="og:description" content="Generator sitasi APA, MLA, Chicago, Harvard.">

    <link rel="canonical" href="https://portalsastra.id/sitasi/">

    <script id="jsonld-schema" type="application/ld+json"></script>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/sitasi.css">
</head>
<body>

<div id="site-header"></div>

<main>

    <section class="section">

        <div class="container">

            <div id="breadcrumb"></div>

            <div class="section-header page-header">

                <div class="page-title">

                    <div class="page-icon">

                        <img
                            src="/assets/icons/quote.svg"
                            alt="Generator Sitasi">

                    </div>

                    <div>

                        <h1 class="section-title">
                            Generator Sitasi
                        </h1>

                        <p class="section-description">
                            Buat sitasi otomatis dalam format APA, MLA, Chicago, dan Harvard untuk kebutuhan akademik.
                        </p>

                    </div>

                </div>

            </div>

            <div style="margin-top: var(--space-6); display: flex; flex-direction: column; gap: var(--space-5);">

                <div class="card">
                    
                    <div class="card-header">
                        <div class="card-title-row">
                            <img
                                src="/assets/icons/file-text.svg"
                                class="card-icon"
                                alt="">
                            <h2>
                                Input Data Referensi
                            </h2>
                        </div>
                    </div>

                    <div class="card-body">

                        <form id="citation-form" style="display: flex; flex-direction: column; gap: var(--space-4);">

                            <div class="field">
                                <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                    <img
                                        src="/assets/icons/user.svg"
                                        class="label-icon"
                                        alt="">
                                    Penulis
                                </label>
                                <input id="author" class="input" type="text" placeholder="Nama penulis">
                            </div>

                            <div class="field">
                                <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                    <img
                                        src="/assets/icons/book.svg"
                                        class="label-icon"
                                        alt="">
                                    Judul
                                </label>
                                <input id="title" class="input" type="text" placeholder="Judul artikel atau buku">
                            </div>

                            <div class="field">
                                <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                    <img
                                        src="/assets/icons/calendar.svg"
                                        class="label-icon"
                                        alt="">
                                    Tahun
                                </label>
                                <input id="year" class="input" type="number" placeholder="2026">
                            </div>

                            <div class="field">
                                <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                    <img
                                        src="/assets/icons/building.svg"
                                        class="label-icon"
                                        alt="">
                                    Penerbit
                                </label>
                                <input id="publisher" class="input" type="text" placeholder="Nama penerbit">
                            </div>

                            <div class="field">
                                <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                    <img
                                        src="/assets/icons/link.svg"
                                        class="label-icon"
                                        alt="">
                                    URL
                                </label>
                                <input id="url" class="input" type="url" placeholder="https://example.com">
                            </div>

                            <div class="field">
                                <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                    <img
                                        src="/assets/icons/list.svg"
                                        class="label-icon"
                                        alt="">
                                    Format
                                </label>
                                <select id="style" class="select">
                                    <option value="apa">APA</option>
                                    <option value="mla">MLA</option>
                                    <option value="chicago">Chicago</option>
                                    <option value="harvard">Harvard</option>
                                </select>
                            </div>

                        </form>

                    </div>

                    <div class="card-footer" style="display: flex; justify-content: flex-end;">
                        <button
                            type="submit"
                            form="citation-form"
                            class="btn btn-primary">
                            <img
                                src="/assets/icons/wand-sparkles.svg"
                                class="btn-icon"
                                alt="">
                            Buat Sitasi
                        </button>
                    </div>

                </div>

                <section class="card citation-box">

                    <div class="card-header">
                        <div class="card-title-row">
                            <img
                                src="/assets/icons/clipboard.svg"
                                class="card-icon"
                                alt="">
                            <h2>Hasil Sitasi</h2>
                        </div>
                    </div>

                    <div class="card-body">
                        <div
                            id="citation-result"
                            class="citation-result">
                            Belum ada sitasi.
                        </div>
                    </div>

                    <div class="card-footer" style="display: flex; gap: var(--space-2); justify-content: flex-end;">
                        <button
                            id="copy-citation"
                            class="btn btn-outline">
                            <img
                                src="/assets/icons/copy.svg"
                                class="btn-icon"
                                alt="">
                            Salin
                        </button>
                        <button
                            id="download-citation"
                            class="btn btn-outline">
                            <img
                                src="/assets/icons/download.svg"
                                class="btn-icon"
                                alt="">
                            Download TXT
                        </button>
                    </div>

                </section>

                <section class="card citation-history">

                    <div class="card-header">
                        <div class="card-title-row">
                            <img
                                src="/assets/icons/history.svg"
                                class="card-icon"
                                alt="">
                            <h2>Riwayat Sitasi</h2>
                        </div>
                    </div>

                    <div class="card-body">
                        <div id="citation-history">
                            <div class="empty-state">
                                <img
                                    src="/assets/icons/history.svg"
                                    class="empty-state-icon"
                                    alt="">
                                <h3>Belum Ada Riwayat</h3>
                                <p>Sitasi yang Anda buat akan tersimpan di sini.</p>
                            </div>
                        </div>
                    </div>

                </section>

            </div>

        </div>

    </section>

</main>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/citation/citation-formatters.js"></script>
<script src="/js/citation/citation-history.js"></script>
<script src="/js/citation/citation-export.js"></script>
<script src="/js/citation/citation-service.js"></script>
<script src="/js/citation/citation-schema.js"></script>
<script src="/js/citation/citation-auto.js"></script>

<script src="index.js"></script>

</body>
</html>
