<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Istilah Sastra Indonesia | Portal Sastra Indonesia</title>
    <meta id="meta-description" name="description" content="Kamus istilah sastra Indonesia lengkap berisi definisi, contoh, penjelasan, referensi akademik, dan istilah terkait.">
    <link id="canonical-url" rel="canonical" href="">
    <meta id="og-title" property="og:title" content="">
    <meta id="og-description" property="og:description" content="">
    <meta id="og-url" property="og:url" content="">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Portal Sastra Indonesia">
    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitter-title" name="twitter:title" content="">
    <meta id="twitter-description" name="twitter:description" content="">
    
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/kamus-istilah.css">

</head>

<body>

    <header id="site-header"></header>

    <main>

        <section class="section">

            <div class="container">

                <div id="breadcrumb"></div>

                <div class="section-header">
                    <div>
                        <h1 class="section-title">
                            Kamus Istilah Sastra
                        </h1>
                        <p class="section-description">
                            Kumpulan istilah sastra Indonesia.
                        </p>
                    </div>
                </div>

                <!-- Perubahan 1 — Search Card Baru -->
                <div class="search-card card fade-up" style="margin-top: var(--space-4);">

                    <div class="search-icon-wrapper">
                        <img
                            src="/assets/icons/search.svg"
                            class="section-icon"
                            alt="Cari">
                    </div>

                    <div class="search-content">

                        <label for="search-input">
                            Cari Istilah Sastra
                        </label>

                        <input
                            id="search-input"
                            class="input"
                            type="text"
                            placeholder="Contoh: Majas, Amanat, Diksi..."
                            autocomplete="off">

                    </div>
                </div>

                <!-- Loader Awal Menggunakan Skeleton Card Global -->
                <div id="loading" style="margin-top: var(--space-4);">
                    <div class="card skeleton" style="height: 100px;"></div>
                </div>

                <!-- Perubahan 2 — Card Riwayat -->
                <div class="history-section card" style="margin-top: var(--space-6);">
                    <div class="card-header">

                        <div class="section-heading">

                            <img
                                src="/assets/icons/history.svg"
                                class="section-icon"
                                alt="">

                            <h2>Terakhir Dicari</h2>

                        </div>

                        <button
                            id="clear-history"
                            class="btn btn-outline">

                            <img
                                src="/assets/icons/trash-2.svg"
                                class="btn-icon"
                                alt="">

                            Hapus Riwayat

                        </button>
                    </div>
                    <div class="card-body">
                        <div id="history-list">
                            <div class="empty-state">
                                <div class="empty-icon"></div>
                                <h3>Belum Ada Riwayat</h3>
                                <p>Aktivitas riwayat pencarian Anda akan muncul di sini.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Perubahan 3 — Bookmark-section card TELAH DIHAPUS -->

                <div class="az-section card" style="margin-top: var(--space-6);">
                    <div class="card-header">
                        <!-- Perubahan 4 — Tambahkan ikon pada filter A-Z -->
                        <div class="section-heading">

                            <img
                                src="/assets/icons/list.svg"
                                class="section-icon"
                                alt="">

                            <h2>Daftar A–Z</h2>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="az-filter" style="display: flex; flex-wrap: wrap; gap: var(--space-2);">
                            <button class="az-btn btn btn-primary aktif" data-huruf="">Semua</button>
                            <button class="az-btn btn btn-outline" data-huruf="A">A</button>
                            <button class="az-btn btn btn-outline" data-huruf="B">B</button>
                            <button class="az-btn btn btn-outline" data-huruf="C">C</button>
                            <button class="az-btn btn btn-outline" data-huruf="D">D</button>
                            <button class="az-btn btn btn-outline" data-huruf="E">E</button>
                            <button class="az-btn btn btn-outline" data-huruf="F">F</button>
                            <button class="az-btn btn btn-outline" data-huruf="G">G</button>
                            <button class="az-btn btn btn-outline" data-huruf="H">H</button>
                            <button class="az-btn btn btn-outline" data-huruf="I">I</button>
                            <button class="az-btn btn btn-outline" data-huruf="J">J</button>
                            <button class="az-btn btn btn-outline" data-huruf="K">K</button>
                            <button class="az-btn btn btn-outline" data-huruf="L">L</button>
                            <button class="az-btn btn btn-outline" data-huruf="M">M</button>
                            <button class="az-btn btn btn-outline" data-huruf="N">N</button>
                            <button class="az-btn btn btn-outline" data-huruf="O">O</button>
                            <button class="az-btn btn btn-outline" data-huruf="P">P</button>
                            <button class="az-btn btn btn-outline" data-huruf="Q">Q</button>
                            <button class="az-btn btn btn-outline" data-huruf="R">R</button>
                            <button class="az-btn btn btn-outline" data-huruf="S">S</button>
                            <button class="az-btn btn btn-outline" data-huruf="T">T</button>
                            <button class="az-btn btn btn-outline" data-huruf="U">U</button>
                            <button class="az-btn btn btn-outline" data-huruf="V">V</button>
                            <button class="az-btn btn btn-outline" data-huruf="W">W</button>
                            <button class="az-btn btn btn-outline" data-huruf="X">X</button>
                            <button class="az-btn btn btn-outline" data-huruf="Y">Y</button>
                            <button class="az-btn btn btn-outline" data-huruf="Z">Z</button>
                        </div>
                    </div>
                </div>

                <div class="tingkat-section card" style="margin-top: var(--space-6);">
                    <div class="card-header">
                        <!-- Perubahan 4 — Tambahkan ikon pada filter Tingkat Kesulitan -->
                        <div class="section-heading">

                            <img
                                src="/assets/icons/layers.svg"
                                class="section-icon"
                                alt="">

                            <h2>Tingkat Kesulitan</h2>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="tingkat-filter" style="display: flex; gap: var(--space-2);">
                            <button class="tingkat-btn btn btn-primary aktif" data-tingkat="">Semua</button>
                            <button class="tingkat-btn btn btn-outline" data-tingkat="Dasar">
                                <span class="badge badge-primary">Dasar</span>
                            </button>
                            <button class="tingkat-btn btn btn-outline" data-tingkat="Menengah">
                                <span class="badge badge-primary">Menengah</span>
                            </button>
                            <button class="tingkat-btn btn btn-outline" data-tingkat="Lanjutan">
                                <span class="badge badge-primary">Lanjutan</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="kategori-section card" style="margin-top: var(--space-6);">
                    <div class="card-header">
                        <!-- Perubahan 4 — Tambahkan ikon pada filter Kategori -->
                        <div class="section-heading">

                            <img
                                src="/assets/icons/folder.svg"
                                class="section-icon"
                                alt="">

                            <h2>Kategori</h2>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="kategori-list">
                            <div class="card skeleton" style="height: 50px;"></div>
                        </div>
                    </div>
                </div>

                <div class="istilah-section" style="margin-top: var(--space-6);">
                    <div id="daftar-istilah">
                        <div class="card skeleton" style="height: 150px; margin-bottom: var(--space-4);"></div>
                        <div class="card skeleton" style="height: 150px;"></div>
                    </div>
                </div>

            </div>

        </section>

    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>

    <script src="/js/auth/auth-service.js"></script>
    <script src="/js/auth/profile-service.js"></script>
    <script src="/js/auth/role-service.js"></script>
    <script src="/js/auth/auth-ui.js"></script>
    <script src="/js/auth/logout.js"></script>

    <script src="/js/core/helpers.js"></script>

    <script src="/js/layout/layout.js"></script>
    <script src="/js/layout/active-menu.js"></script>
    <script src="/js/layout/mobile-menu.js"></script>

    <script src="index.js"></script>

</body>

</html>
