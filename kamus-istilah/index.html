<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Istilah Sastra Indonesia | Portal Sastra Indonesia</title>

    <link id="canonical-url" rel="canonical" href="">
    <meta id="og-title" property="og:title" content="">
    <meta id="og-description" property="og:description" content="">
    <meta id="og-url" property="og:url" content="">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Portal Sastra Indonesia">
    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitter-title" name="twitter:title" content="">
    <meta id="twitter-description" name="twitter:description" content="">
    
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/cards.css">

    <link rel="stylesheet" href="/css/layout.css">
</head>

<body>

    <header id="site-header"></header>

    <main>

        <section class="section">

            <div class="container">

                <div class="section-header">
                    <div>
                        <h1 class="section-title">
                            Kamus Istilah Sastra
                        </h1>
                        <p class="section-description">
                            Kumpulan istilah sastra Indonesia.
                        </p>
                    </div>
                </div>

                <div id="loading">
                    Memuat data...
                </div>

                <div class="search-section">
                    <input type="text" id="search-input" placeholder="Cari istilah sastra..." autocomplete="off">
                </div>

                <div class="history-section" style="margin-top: var(--space-6);">
                    <h2>Terakhir Dicari</h2>
                    
                    <button id="clear-history">Hapus Riwayat</button>
                    
                    <div id="history-list">
                        Belum ada riwayat.
                    </div>
                </div>

                <div class="bookmark-section" style="margin-top: var(--space-6);">
                    <h2>Bookmark Saya</h2>
                    <div id="bookmark-list">
                        Belum ada bookmark.
                    </div>
                </div>

                <div class="az-section" style="margin-top: var(--space-6);">
                    <h2>Daftar A-Z</h2>
                    <div id="az-filter">
                        <button class="az-btn aktif" data-huruf="">
                            Semua
                        </button>
                        <button class="az-btn" data-huruf="A">A</button>
                        <button class="az-btn" data-huruf="B">B</button>
                        <button class="az-btn" data-huruf="C">C</button>
                        <button class="az-btn" data-huruf="D">D</button>
                        <button class="az-btn" data-huruf="E">E</button>
                        <button class="az-btn" data-huruf="F">F</button>
                        <button class="az-btn" data-huruf="G">G</button>
                        <button class="az-btn" data-huruf="H">H</button>
                        <button class="az-btn" data-huruf="I">I</button>
                        <button class="az-btn" data-huruf="J">J</button>
                        <button class="az-btn" data-huruf="K">K</button>
                        <button class="az-btn" data-huruf="L">L</button>
                        <button class="az-btn" data-huruf="M">M</button>
                        <button class="az-btn" data-huruf="N">N</button>
                        <button class="az-btn" data-huruf="O">O</button>
                        <button class="az-btn" data-huruf="P">P</button>
                        <button class="az-btn" data-huruf="Q">Q</button>
                        <button class="az-btn" data-huruf="R">R</button>
                        <button class="az-btn" data-huruf="S">S</button>
                        <button class="az-btn" data-huruf="T">T</button>
                        <button class="az-btn" data-huruf="U">U</button>
                        <button class="az-btn" data-huruf="V">V</button>
                        <button class="az-btn" data-huruf="W">W</button>
                        <button class="az-btn" data-huruf="X">X</button>
                        <button class="az-btn" data-huruf="Y">Y</button>
                        <button class="az-btn" data-huruf="Z">Z</button>
                    </div>
                </div>

                <div class="tingkat-section" style="margin-top: var(--space-6);">
                    <h2>Tingkat Kesulitan</h2>
                    <div id="tingkat-filter">
                        <button class="tingkat-btn aktif" data-tingkat="">
                            Semua
                        </button>
                        <button class="tingkat-btn" data-tingkat="Dasar">
                            Dasar
                        </button>
                        <button class="tingkat-btn" data-tingkat="Menengah">
                            Menengah
                        </button>
                        <button class="tingkat-btn" data-tingkat="Lanjutan">
                            Lanjutan
                        </button>
                    </div>
                </div>

                <div class="kategori-section" style="margin-top: var(--space-6);">
                    <h2>Kategori</h2>
                    <div id="kategori-list">
                        Memuat kategori...
                    </div>
                </div>

                <div class="istilah-section" style="margin-top: var(--space-6);">
                    <div id="daftar-istilah">
                        Memuat istilah...
                    </div>
                </div>

            </div>

        </section>

    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
