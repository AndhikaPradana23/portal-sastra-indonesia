<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Database Sastrawan Indonesia | Portal Sastra Indonesia</title>

<meta id="meta-description" name="description" content="Ensiklopedia sastrawan Indonesia berisi biografi, karya sastra, penghargaan, referensi akademik, artikel, dan tokoh sastra dari berbagai angkatan.">

<link id="canonical-url" rel="canonical" href="">

<meta id="og-title" property="og:title" content="">

<meta id="og-description" property="og:description" content="">

<meta id="og-url" property="og:url" content="">

<meta property="og:type" content="website">

<meta property="og:site_name" content="Portal Sastra Indonesia">

<meta name="twitter:card" content="summary_large_image">

<meta id="twitter-title" name="twitter:title" content="">

<meta id="twitter-description" name="twitter:description" content="">

<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/typography.css">
<link rel="stylesheet" href="/css/spacing.css">
<link rel="stylesheet" href="/css/layout.css">
   
<link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="/css/cards.css">
<link rel="stylesheet" href="/css/forms.css">
<link rel="stylesheet" href="/css/badges.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/skeleton.css">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/responsive.css">

<link rel="stylesheet" href="/css/sastrawan.css">


</head>
<body>

<header id="site-header"></header>

<main>

    <section class="section">

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Database Sastrawan
                    </h1>

                    <p class="section-description">
                        Profil sastrawan Indonesia.
                    </p>

                </div>

            </div>

            <div class="search-section">
                <div class="search-box">
                    🔎
                    <input type="text" id="search-input" class="input" placeholder="Cari sastrawan...">
                </div>
            </div>

            <div class="az-section" style="margin-top: var(--space-6);">

                <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-3);">Daftar A-Z</h2>

                <div id="az-filter" style="display: flex; flex-wrap: wrap; gap: var(--space-2);">

                    <button class="btn btn-primary az-btn aktif" data-huruf="">
                        Semua
                    </button>

                </div>

            </div>

            <div class="angkatan-section" style="margin-top: var(--space-6);">

                <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-3);">Filter Angkatan</h2>

                <div id="angkatan-filter" style="display: flex; flex-wrap: wrap; gap: var(--space-2);">

                    <button class="btn btn-primary angkatan-btn aktif" data-angkatan="">
                        Semua
                    </button>

                    <button class="btn btn-outline angkatan-btn" data-angkatan="Balai Pustaka">
                        Balai Pustaka
                    </button>

                    <button class="btn btn-outline angkatan-btn" data-angkatan="Pujangga Baru">
                        Pujangga Baru
                    </button>

                    <button class="btn btn-outline angkatan-btn" data-angkatan="Angkatan 45">
                        Angkatan 45
                    </button>

                    <button class="btn btn-outline angkatan-btn" data-angkatan="Angkatan 1966">
                        Angkatan 1966
                    </button>

                    <button class="btn btn-outline angkatan-btn" data-angkatan="Angkatan Reformasi">
                        Reformasi
                    </button>

                </div>

            </div>

            <div class="jenis-section" style="margin-top: var(--space-6);">

                <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-3);">Filter Jenis</h2>

                <div id="jenis-filter" style="display: flex; flex-wrap: wrap; gap: var(--space-2);">

                    <button class="btn btn-primary jenis-btn aktif" data-jenis="">
                        Semua
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Penyair">
                        Penyair
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Novelis">
                        Novelis
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Cerpenis">
                        Cerpenis
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Dramawan">
                        Dramawan
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Esais">
                        Esais
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Kritikus">
                        Kritikus
                    </button>

                    <button class="btn btn-outline jenis-btn" data-jenis="Sastrawan Multigenre">
                        Multigenre
                    </button>

                </div>

            </div>

            <div id="loading" style="margin-top: var(--space-5);">
                <div class="card skeleton" style="height: 200px;"></div>
            </div>

            <div id="sastrawanList" style="margin-top: var(--space-5);">

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/logout.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/auth-state.js"></script>

<script src="/js/core/helpers.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="index.js"></script>

</body>
</html>
