<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Leaderboard Kuis | Portal Sastra Indonesia</title>

    <meta name="description" content="Papan peringkat kuis sastra Indonesia berdasarkan akumulasi skor setiap pengguna.">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/kuis.css">
</head>

<body>

<header id="site-header"></header>

<main class="leaderboard-page">
    <section class="section">
        <div class="container">
            <div id="breadcrumb"></div>
            
            <div class="quiz-mini-hero">
                <div class="quiz-mini-icon">
                    <img src="/assets/icons/trophy.svg" alt="Leaderboard">
                </div>
                <div class="quiz-mini-details">
                    <h1 class="quiz-mini-title">Leaderboard Kuis Sastra</h1>
                    <p class="quiz-mini-description">
                        Papan peringkat dihitung berdasarkan <b>akumulasi skor</b> setiap akun. 
                    </p>
                </div>
            </div>

            <div class="card" style="margin-top: var(--space-6);">
                <div class="card-header">
                    <h3>Peringkat Pengguna</h3>
                    <small style="color: var(--text-light);">
                        Akumulasi skor dari seluruh kategori kuis.
                    </small>
                </div>

                <div class="card-body">
                    <div id="leaderboard-list">
                        <div class="card skeleton" style="height: 320px;"></div>
                    </div>
                </div>

                <div class="card-footer" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-3);">
                    <a href="/kuis/index.html" class="btn btn-outline">
                        ← Menu Kuis
                    </a>
                    <a href="/kuis/history.html" class="btn btn-primary">
                        Riwayat Saya
                    </a>
                </div>
            </div>
        </div>
    </section>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/session.js"></script>
<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/kuis/quiz-leaderboard.js"></script>

<script src="leaderboard.js"></script>

</body>
</html>
