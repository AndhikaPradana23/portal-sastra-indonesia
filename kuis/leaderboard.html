<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Leaderboard Kuis | Portal Sastra Indonesia</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/kuis.css">

</head>
<body>

<header id="site-header"></header>

<main class="leaderboard-page">

    <section class="section">

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Leaderboard Kuis
                    </h1>

                    <p class="section-description">
                        Uji pemahaman sastra Indonesia.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6);">

                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-3);">
                    
                    <h3 style="margin: 0;">Peringkat Tertinggi</h3>

                    <div class="filter-container" style="display: flex; align-items: center; gap: var(--space-2);">
                        
                        <label for="leaderboard-filter" style="font-weight: var(--font-weight-medium); white-space: nowrap;">
                            Kategori:
                        </label>

                        <select id="leaderboard-filter" class="select">
                            <option value="">Semua</option>
                            <option value="istilah">Istilah</option>
                            <option value="sastrawan">Sastrawan</option>
                            <option value="karya">Karya</option>
                            <option value="campuran">Campuran</option>
                        </select>

                    </div>

                </div>

                <div class="card-body">

                    <div id="leaderboard-list">
                        
                        <div class="card skeleton" style="height: 250px;"></div>

                        <!-- 
                          Catatan untuk sistem JavaScript Anda: Jika data kosong atau belum ada skor kuis, 
                          ganti isi kontainer di atas dengan komponen standarisasi berikut:
                          
                          <div class="empty-state">
                              <div class="empty-icon">📚</div>
                              <h3>Belum Ada Riwayat</h3>
                              <p>Coba gunakan kata kunci lain atau jadilah yang pertama mengisi papan peringkat kuis!</p>
                          </div>
                        -->

                    </div>

                </div>

                <div class="card-footer" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-2);">
                    <a href="/kuis/index.html" class="btn btn-outline">
                        ↩️ Kembali ke Menu Kuis
                    </a>
                    <a href="/kuis/history.html" class="btn btn-primary">
                        📜 Lihat Skor Saya
                    </a>
                </div>

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/session.js"></script>
<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>
<script src="/js/auth/auth-state.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/kuis/quiz-leaderboard.js"></script>

<script src="leaderboard.js"></script>

</body>
</html>
