<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Riwayat Nilai Kuis | Portal Sastra Indonesia</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/kuis.css">

</head>
<body>

<header id="site-header"></header>

<main class="quiz-history-page">

    <section class="section">

        <div class="container">

            <div id="breadcrumb"></div>

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Riwayat Nilai Kuis
                    </h1>

                    <p class="section-description">
                        Uji pemahaman sastra Indonesia.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6);">
                
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-3);">
                    <h3 style="margin: 0;">Daftar Skor Kuis Anda</h3>
                    <button id="clear-history-btn" class="btn btn-outline">
                        🗑️ Hapus Riwayat
                    </button>
                </div>

                <div class="card-body">
                    
                    <div id="quiz-history">
                        
                        <div class="card skeleton" style="height: 100px; margin-bottom: var(--space-3);"></div>
                        <div class="card skeleton" style="height: 100px;"></div>

                        <!-- 
                          Catatan untuk script JavaScript Anda: Jika riwayat kuis masih kosong,
                          ganti isi elemen #quiz-history dengan komponen standarisasi berikut:
                          
                          <div class="empty-state">
                              <div class="empty-icon">📚</div>
                              <h3>Belum Ada Riwayat Kuis</h3>
                              <p>Anda belum pernah mengambil kuis. Silakan coba kuis pertama Anda!</p>
                          </div>
                        -->

                    </div>

                </div>

                <div class="card-footer" style="display: flex; justify-content: flex-end;">
                    <a href="/kuis/index.html" class="btn btn-primary">
                        Mulai Kuis Baru
                    </a>
                </div>

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>
<script src="/js/auth/auth-state.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/kuis/quiz-history.js"></script>

<script src="history.js"></script>

</body>
</html>
