<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Riwayat Nilai Kuis | Portal Sastra Indonesia</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">
   
    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/kuis.css">

</head>
<body>

<header id="site-header"></header>

<main class="quiz-history-page">

    <section class="section">

        <div class="container">

            <div id="breadcrumb"></div>

            <div class="quiz-mini-hero fade-up">

                <div class="quiz-mini-icon">

                    <img
                        src="/assets/icons/history.svg"
                        alt="Riwayat"
                    >

                </div>

                <div>

                    <h1 class="section-title">
                        Riwayat Nilai Kuis
                    </h1>

                    <p class="section-description">
                        Lihat seluruh hasil kuis yang pernah Anda kerjakan beserta perkembangan skor Anda.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6);">
                
                <div class="quiz-result-header">

                    <div class="section-title-group">

                        <div class="section-icon-wrapper">

                            <img
                                src="/assets/icons/list-checks.svg"
                                class="section-icon"
                                alt=""
                            >

                        </div>

                        <div>

                            <h2 class="card-title">
                                Daftar Skor Kuis
                            </h2>

                            <p class="card-description">

                                Semua riwayat hasil kuis Anda akan tampil di bawah ini.

                            </p>

                        </div>

                    </div>

                    <button
                        id="clear-history-btn"
                        class="btn btn-outline"
                    >

                        <img
                            src="/assets/icons/trash-2.svg"
                            class="btn-icon"
                            alt=""
                        >

                        Hapus Riwayat

                    </button>

                </div>

                <div class="card-body">
                    
                    <div id="quiz-history">
                        
                        <div class="card skeleton" style="height: 100px; margin-bottom: var(--space-3);"></div>
                        <div class="card skeleton" style="height: 100px;"></div>

                        <!-- 
                          Catatan untuk script JavaScript Anda: Jika riwayat kuis masih kosong,
                          ganti isi elemen #quiz-history dengan komponen standarisasi berikut:
                          
                          <div class="empty-state">
                              <div class="empty-icon">📚</div>
                              <h3>Belum Ada Riwayat Kuis</h3>
                              <p>Anda belum pernah mengambil kuis. Silakan coba kuis pertama Anda!</p>
                          </div>
                        -->

                    </div>

                </div>

                <div class="quiz-result-footer">

                    <div></div>

                    <div class="quiz-result-actions">

                        <a
                            href="/kuis/index.html"
                            class="btn btn-primary"
                        >

                            <img
                                src="/assets/icons/play.svg"
                                class="btn-icon"
                                alt=""
                            >

                            Mulai Kuis Baru

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/kuis/quiz-history.js"></script>

<script src="history.js"></script>

</body>
</html>
