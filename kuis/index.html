<body>

    <header id="site-header"></header>

    <main class="quiz-page">

        <section class="section">

            <div class="container">

                <div id="breadcrumb"></div>

                <div class="section-header">
                    <div>
                        <h1 class="section-title">
                            Kuis Sastra Indonesia
                        </h1>
                        <p class="section-description">
                            Uji pemahaman sastra Indonesia.
                        </p>
                    </div>
                </div>

                <div class="quiz-hero" style="margin-top: var(--space-4);">
                    <p>
                        Uji pemahaman Anda mengenai istilah sastra, sastrawan, karya sastra, dan artikel melalui simulasi interaktif di bawah ini.
                    </p>
                </div>

                <div class="quiz-form card" style="margin-top: var(--space-6); padding: var(--space-5);">
                    
                    <div class="card-header" style="padding-left: 0; padding-right: 0; padding-top: 0;">
                        <h3 style="margin: 0;">Konfigurasi Kuis Sastra</h3>
                    </div>

                    <div class="card-body" style="padding-left: 0; padding-right: 0; display: flex; flex-direction: column; gap: var(--space-4);">
                        
                        <div class="form-group">
                            <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                Kategori Kuis
                            </label>
                            <select id="quiz-category" class="select">
                                <option value="istilah">Istilah Sastra</option>
                                <option value="sastrawan">Sastrawan</option>
                                <option value="karya">Karya Sastra</option>
                                <option value="campuran">Campuran</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label style="display: block; margin-bottom: var(--space-2); font-weight: var(--font-weight-medium);">
                                Jumlah Soal
                            </label>
                            <select id="quiz-total" class="select">
                                <option value="5">5 Soal</option>
                                <option value="10">10 Soal</option>
                                <option value="20">20 Soal</option>
                            </select>
                        </div>

                        <button id="start-quiz-btn" class="btn btn-primary" style="width: 100%; margin-top: var(--space-2);">
                            Mulai Kuis
                        </button>

                    </div>

                    <div class="card-footer" style="padding-left: 0; padding-right: 0; padding-bottom: 0; border-top: 1px solid var(--border-color); padding-top: var(--space-4);">
                        <div class="quiz-links" style="display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap;">
                            <a href="/kuis/history.html" class="btn btn-outline">
                                📜 Riwayat Nilai
                            </a>
                            <a href="/kuis/leaderboard.html" class="btn btn-outline">
                                🏆 Leaderboard
                            </a>
                        </div>
                    </div>

                </div>

            </div>

        </section>

    </main>
