<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Hasil Kuis Sastra | Portal Sastra Indonesia</title>

    <meta
        name="description"
        content="Lihat hasil kuis sastra Indonesia."
    >

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/typography.css">
    <link rel="stylesheet" href="/css/spacing.css">
    <link rel="stylesheet" href="/css/layout.css">

    <link rel="stylesheet" href="/css/buttons.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/badges.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/skeleton.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/kuis.css">
</head>

<body>

<header id="site-header"></header>

<main class="quiz-result-page">

    <section class="section">

        <div class="container">

            <div id="breadcrumb"></div>

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Kuis Sastra Indonesia
                    </h1>

                    <p class="section-description">
                        Lihat hasil evaluasi serta pembahasan jawaban kuis sastra Indonesia.
                    </p>

                </div>

            </div>

            <div
                id="quiz-result-card"
                class="card quiz-result-wrapper"
            >

                <div class="card-header quiz-result-header">

                    <div class="section-title-group">

                        <div class="section-icon-wrapper">

                            <img
                                src="/assets/icons/clipboard-check.svg"
                                alt=""
                                class="section-icon"
                            >

                        </div>

                        <div>

                            <h2 class="card-title">

                                Ringkasan Hasil Evaluasi

                            </h2>

                            <p class="card-description">

                                Nilai akhir, statistik jawaban, dan pembahasan setiap soal.

                            </p>

                        </div>

                    </div>

                </div>

                <div class="card-body">

                    <div id="quiz-result">

                        <div
                            class="
                                card
                                skeleton
                                quiz-result-skeleton
                            ">
                        </div>

                    </div>

                </div>

                <div class="card-footer quiz-result-footer">

                    <a
                        href="/kuis/index.html"
                        class="btn btn-outline"
                    >

                        <img
                            src="/assets/icons/house.svg"
                            alt=""
                            class="label-icon"
                        >

                        <span>

                            Menu Utama Kuis

                        </span>

                    </a>

                    <div class="quiz-result-actions">

                        <a
                            href="/kuis/history.html"
                            class="btn btn-outline"
                        >

                            <img
                                src="/assets/icons/history.svg"
                                alt=""
                                class="label-icon"
                            >

                            <span>

                                Riwayat Skor

                            </span>

                        </a>

                        <a
                            href="/kuis/play.html"
                            class="btn btn-primary"
                        >

                            <img
                                src="/assets/icons/rotate-ccw.svg"
                                alt=""
                                class="label-icon"
                            >

                            <span>

                                Coba Lagi

                            </span>

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>
<script src="/js/auth/auth-state.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/kuis/quiz-utils.js"></script>
<script src="/js/kuis/quiz-storage.js"></script>

<script src="/js/kuis/quiz-score.js"></script>
<script src="/js/kuis/quiz-result.js"></script>
<script src="/js/kuis/quiz-review.js"></script>
<script src="/js/kuis/quiz-summary.js"></script>

<script src="result.js"></script>

</body>
</html>
