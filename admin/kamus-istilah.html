<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Istilah</title>
    <link rel="stylesheet" href="../admin/css/kamus-istilah.css">
    <link rel="stylesheet" href="../admin/css/sidebar.css">
</head>
<body>

<div class="dashboard-container">

    <div id="sidebar-container"></div>

    <main>

        <div class="page-header">
            <h1>Kelola Istilah</h1>
            <button id="btn-tambah">
                + Tambah Istilah
            </button>
        </div>

        <input
            type="text"
            id="search-input"
            placeholder="Cari istilah..."
        >

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Kategori</th>
                    <th>Tingkat</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="istilah-body">
                </tbody>
        </table>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../admin/js/admin-auth.js"></script>
<script src="../admin/js/kamus-istilah.js"></script>
<script src="../admin/js/sidebar.js"></script>

</body>
</html>
