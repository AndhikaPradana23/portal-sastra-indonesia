<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Karya</title>

    <link rel="stylesheet" href="../admin/css/sidebar.css">
    <link rel="stylesheet" href="../admin/css/karya-sastra.css">
</head>
<body>

    <div class="dashboard-container">

        <div id="sidebar-container" class="sidebar"></div>

        <main>
            <div class="page-header">
                <h1>Kelola Karya Sastra</h1>
                <button id="btn-tambah">+ Tambah Karya</button>
            </div>

            <div class="toolbar">
                <input type="text" id="search-karya" placeholder="Cari judul karya...">
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Judul</th>
                        <th>Jenis</th>
                        <th>Tahun</th>
                        <th>Slug</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="karyaTable">
                    </tbody>
            </table>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../admin/js/admin-auth.js"></script>
    <script src="../admin/js/karya-sastra.js"></script>
    <script src="../admin/js/sidebar.js"></script>

</body>
</html>
