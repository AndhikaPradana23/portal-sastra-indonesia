<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Login Admin</title>

<link
rel="stylesheet"
href="../admin/css/login.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>
<body>

<div class="login-box">

    <h1>Portal Sastra Indonesia</h1>

    <h2>Login Admin</h2>

    <form id="login-form">

        <input
        type="email"
        id="email"
        placeholder="Email"
        required>

        <input
        type="password"
        id="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="message"></p>

</div>

<script src="../admin/js/admin-auth.js"></script>

<script>

const form =
document.getElementById("login-form");

form.addEventListener(
"submit",
async function(e){

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const message =
document.getElementById("message");

message.textContent = "Memproses...";

const { error } =
await adminSupabase.auth.signInWithPassword({
    email,
    password
});

if(error){

    message.textContent =
    error.message;

    return;
}

window.location.href =
"dashboard.html";

});

</script>

</body>
</html>
