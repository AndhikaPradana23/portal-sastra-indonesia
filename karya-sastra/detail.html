<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Karya Sastra | Portal Sastra Indonesia</title>

<meta id="meta-description" name="description" content="Portal Sastra Indonesia">

<link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/typography.css">
<link rel="stylesheet" href="/css/spacing.css">
<link rel="stylesheet" href="/css/layout.css">
   
<link rel="stylesheet" href="/css/buttons.css">
<link rel="stylesheet" href="/css/cards.css">
<link rel="stylesheet" href="/css/forms.css">
<link rel="stylesheet" href="/css/badges.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/skeleton.css">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/responsive.css">

<link rel="stylesheet" href="/css/karya-sastra.css">

<script id="jsonld-schema" type="application/ld+json">{}</script>
</head>

<body>

<header id="site-header"></header>

<div id="breadcrumb"></div>

<main>

    <section class="section">

        <div class="container">

            <div id="breadcrumb"></div>

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Karya Sastra
                    </h1>

                    <p class="section-description">
                        Novel, puisi, cerpen, dan drama.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6);">
                
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-3);">
                    <div style="display: flex; align-items: center; gap: var(--space-2);">
                        <h3 style="margin: 0;">Konten Sastra</h3>
                        <span class="badge badge-primary">Jenis Karya</span>
                    </div>
                    
                    <div class="card-actions" style="display: flex; gap: var(--space-2);">
                        <button id="bookmark-button" class="btn btn-outline">
                            🔖 Bookmark
                        </button>
                        <button id="citation-btn" class="btn btn-secondary">
                            📋 Sitasi Karya
                        </button>
                    </div>
                </div>

                <div class="card-body">
                    
                    <div id="detail-karya">

                        <div id="loading-text">
                            <div class="card skeleton" style="height: 150px; margin-bottom: var(--space-4);"></div>
                            <div class="card skeleton" style="height: 100px;"></div>
                        </div>

                        <!-- 
                          Catatan untuk sistem JavaScript Anda: Jika data gagal dimuat atau kosong, 
                          ganti isi kontainer di atas dengan markup standar empty-state berikut:
                          
                          <div class="empty-state">
                              <div class="empty-icon">📚</div>
                              <h3>Karya Tidak Ditemukan</h3>
                              <p>Gagal memuat detail karya sastra. Silakan coba beberapa saat lagi.</p>
                          </div>
                        -->

                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase-public.js"></script>

<script src="/js/auth/auth-service.js"></script>
<script src="/js/auth/profile-service.js"></script>
<script src="/js/auth/role-service.js"></script>
<script src="/js/auth/auth-ui.js"></script>
<script src="/js/auth/logout.js"></script>
<script src="/js/auth/auth-state.js"></script>

<script src="/js/core/helpers.js"></script>

<script src="/js/bookmark/bookmark-service.js"></script>
<script src="/js/bookmark/bookmark-storage.js"></script>
<script src="/js/bookmark/bookmark-button.js"></script>

<script src="/js/layout/layout.js"></script>
<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="/js/citation/citation-auto.js"></script>

<script src="detail.js"></script>

</body>
</html>
