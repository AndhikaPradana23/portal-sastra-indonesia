<header id="site-header"></header>

<main>

    <section
        class="
        section

    >

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">

                        Karya Sastra

                    </h1>

                    <p class="section-description">

                        Novel, puisi, cerpen, dan drama.

                    </p>

                </div>

            </div>

            <div class="filter-section" style="margin-top: var(--space-6);">

                <h2>
                    Filter Jenis
                </h2>

                <div id="jenis-filter">

                    <button class="jenis-btn aktif" data-jenis="">Semua</button>

                    <button class="jenis-btn" data-jenis="Novel">Novel</button>

                    <button class="jenis-btn" data-jenis="Puisi">Puisi</button>

                    <button class="jenis-btn" data-jenis="Cerpen">Cerpen</button>

                    <button class="jenis-btn" data-jenis="Drama">Drama</button>

                    <button class="jenis-btn" data-jenis="Esai">Esai</button>

                </div>

            </div>

            <div class="filter-section" style="margin-top: var(--space-6);">

                <h2>
                    Filter Tahun
                </h2>

                <select id="tahun-filter">

                    <option value="">
                        Semua Periode
                    </option>

                    <option value="1900-1945">
                        1900–1945
                    </option>

                    <option value="1945-1965">
                        1945–1965
                    </option>

                    <option value="1966-1998">
                        1966–1998
                    </option>

                    <option value="1999-9999">
                        1998–Sekarang
                    </option>

                </select>

            </div>

            <div class="filter-section" style="margin-top: var(--space-6);">

                <h2>
                    Filter Penulis
                </h2>

                <select id="penulis-filter">

                    <option value="">
                        Semua Penulis
                    </option>

                </select>

            </div>

            <div class="filter-section" style="margin-top: var(--space-6);">

                <h2>
                    Filter Genre
                </h2>

                <select id="genre-filter">

                    <option value="">
                        Semua Genre
                    </option>

                </select>

            </div>

            <div id="karya-container" style="margin-top: var(--space-6);">
                Memuat data...
            </div>

        </div>

    </section>
