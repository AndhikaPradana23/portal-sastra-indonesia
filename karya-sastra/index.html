<link rel="stylesheet" href="/css/typography.css">
<link rel="stylesheet" href="/css/spacing.css">
<link rel="stylesheet" href="/css/layout.css">
   
<link rel="stylesheet" href="/css/buttons.css">

<link rel="stylesheet" href="/css/badges.css">

</head>
<body>

<header id="site-header"></header>

<main>

    <section class="section">

        <div class="container">

            <div class="section-header">

                <div>

                    <h1 class="section-title">
                        Karya Sastra
                    </h1>

                    <p class="section-description">
                        Novel, puisi, cerpen, dan drama.
                    </p>

                </div>

            </div>

            <div class="card" style="margin-top: var(--space-6); padding: var(--space-4);">
                
                <div class="filter-section">
                    <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-2);">
                        Filter Jenis
                    </h2>
                    <div id="jenis-filter" style="display: flex; flex-wrap: wrap; gap: var(--space-2);">
                        <button class="jenis-btn btn btn-primary aktif" data-jenis="">Semua</button>
                        <button class="jenis-btn btn btn-outline" data-jenis="Novel">Novel</button>
                        <button class="jenis-btn btn btn-outline" data-jenis="Puisi">Puisi</button>
                        <button class="jenis-btn btn btn-outline" data-jenis="Cerpen">Cerpen</button>
                        <button class="jenis-btn btn btn-outline" data-jenis="Drama">Drama</button>
                        <button class="jenis-btn btn btn-outline" data-jenis="Esai">Esai</button>
                    </div>
                </div>

                <div class="filter-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4); margin-top: var(--space-4);">
                    
                    <div class="filter-section">
                        <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-2);">
                            Filter Tahun
                        </h2>
                        <select id="tahun-filter" class="select">
                            <option value="">Semua Periode</option>
                            <option value="1900-1945">1900–1945</option>
                            <option value="1945-1965">1945–1965</option>
                            <option value="1966-1998">1966–1998</option>
                            <option value="1999-9999">1998–Sekarang</option>
                        </select>
                    </div>

                    <div class="filter-section">
                        <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-2);">
                            Filter Penulis
                        </h2>
                        <select id="penulis-filter" class="select">
                            <option value="">Semua Penulis</option>
                        </select>
                    </div>

                    <div class="filter-section">
                        <h2 style="font-size: var(--font-size-md); margin-bottom: var(--space-2);">
                            Filter Genre
                        </h2>
                        <select id="genre-filter" class="select">
                            <option value="">Semua Genre</option>
                        </select>
                    </div>

                </div>

            </div>

            <div id="karya-container" style="margin-top: var(--space-6);">
                
                <div class="card skeleton" style="height: 200px; margin-bottom: var(--space-4);"></div>
                <div class="card skeleton" style="height: 200px;"></div>

                <!-- 
                  Catatan untuk sistem JavaScript Anda: Jika pencarian/filter menghasilkan nihil, 
                  ganti struktur innerHTML dengan markup standar empty-state berikut:
                  
                  <div class="empty-state">
                      <div class="empty-icon">📚</div>
                      <h3>Belum Ada Karya Sastra</h3>
                      <p>Coba gunakan kombinasi filter atau kata kunci lain.</p>
                  </div>
                -->

            </div>

        </div>

    </section>

</main>

<footer id="site-footer"></footer>

<script src="/js/layout/active-menu.js"></script>
<script src="/js/layout/mobile-menu.js"></script>

<script src="index.js"></script>

</body>
</html>
